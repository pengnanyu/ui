name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Generate Release Keystore
        run: |
          if [ ! -f app/release.keystore ]; then
            keytool -genkeypair -v \
              -keystore app/release.keystore \
              -storepass "Fkue@1023" \
              -alias "dcsf-bms" \
              -keypass "Fkue@1023" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=DCSF, OU=Engineering, O=Shenzhen-Dcsf, L=Shenzhen, ST=Guangdong, C=CN"
          fi

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease

      - name: Copy APKs to out/
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/bms-debug.apk
          cp app/build/outputs/apk/release/app-release.apk out/bms-release.apk
          echo "## Build Output" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in out/*.apk; do echo "| $(basename $f) | $(du -h $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY; done

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: bms-apk
          path: out/*.apk
